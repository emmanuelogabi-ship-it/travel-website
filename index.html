<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Away</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fffaf5;
      font-family: 'Instrument Sans', sans-serif;
      overflow-x: hidden;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 1440px;
      min-height: 3200px;
      transform-origin: top left;
      transform: scale(var(--scale));
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 44px;
      left: 74px;
      right: 74px;
      display: flex;
      align-items: center;
      z-index: 20;
    }

    .logo {
      font-weight: 700;
      font-size: 32px;
      color: #000;
    }

    .nav-links {
      display: flex;
      gap: 64px;
      list-style: none;
      font-size: 14px;
      color: #000;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a { text-decoration: none; color: inherit; }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: none;
      border-radius: 4px;
      padding: 14px 28px;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      color: #000;
      margin-left: auto;
    }

    .contact-btn .arrow {
      width: 24px;
      height: 24px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .nav-divider {
      position: absolute;
      top: 99px;
      left: 74px;
      right: 74px;
      height: 1px;
      background: rgba(0, 0, 0, 0.12);
    }

    /* ── HERO ── */
    .hero {
      position: absolute;
      top: 117px;
      left: 74px;
      right: 74px;
      height: 461px;
      border-radius: 24px;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 104%;
      height: 220%;
      left: -2%;
      top: -47%;
      object-fit: cover;
    }

    .hero-title {
      position: absolute;
      top: 204px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 700;
      font-size: 32px;
      color: #000;
      white-space: nowrap;
      z-index: 2;
    }

    /* ── SEARCH CARD ── */
    .search-card {
      position: absolute;
      top: 491px;
      left: 50%;
      transform: translateX(-50%);
      width: 860px;
      height: 191px;
      background: white;
      border-radius: 24px;
      z-index: 5;
    }

    /* ── ARC WHEEL ── */
    .pw {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pc {
      border-radius: 11px;
      overflow: hidden;
      width: 166px;
      height: 210px;
      position: relative;
      flex-shrink: 0;
      will-change: transform;
    }

    .pc img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── GRADIENT FADE ── */
    .fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1600px;
      background: linear-gradient(to top, #fffaf5 45%, rgba(255,250,245,0) 80%);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav>
    <span class="logo">Away</span>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Tour</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <button class="contact-btn">
      Contact us
      <span class="arrow">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 6.5H10.5M7 3L10.5 6.5L7 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>
  </nav>

  <div class="nav-divider"></div>

  <!-- HERO -->
  <div class="hero">
    <img src="images/daniela-cuevas-t7YycgAoVSw-unsplash.jpg" alt="Hero landscape" />
  </div>
  <p class="hero-title">Reverb.</p>

  <!-- SEARCH CARD -->
  <div class="search-card"></div>

  <!-- ── ARC WHEEL ──
       All 14 cards are children of #arcWheel, positioned relative to the
       circle centre at page (720, 2050). GSAP rotates the whole wheel on scroll.
       Card offsets = card_page_pos − (720, 2050).
  -->
  <div id="arcSection" style="position:absolute;top:950px;left:0;width:1440px;height:2200px;pointer-events:none;overflow:visible;">
    <div id="arcWheel" style="position:absolute;left:720px;top:1100px;width:0;height:0;transform-origin:0 0;will-change:transform;">

      <!-- card helper: each .pw sits at offset from wheel centre; .pc holds the tilt -->

      <!-- 0 — top centre, 0° -->
      <div class="pw" style="left:-83px;top:-814px;width:166px;height:210px;">
        <div class="pc" data-rot="0"><img src="images/taras-terletskyy-OrhPYiKmXsE-unsplash.jpg" alt=""></div>
      </div>

      <!-- 1 — slight left, −23° -->
      <div class="pw" style="left:-388px;top:-785px;width:237px;height:260px;">
        <div class="pc" data-rot="-23"><img src="images/tania-mousinho-vF0l0bqLRKY-unsplash.jpg" alt=""></div>
      </div>

      <!-- 2 — slight right, +23° -->
      <div class="pw" style="left:149px;top:-783px;width:237px;height:260px;">
        <div class="pc" data-rot="23"><img src="images/daniela-cuevas-t7YycgAoVSw-unsplash.jpg" alt=""></div>
      </div>

      <!-- 3 — left, 135° -->
      <div class="pw" style="left:-608px;top:-632px;width:266px;height:266px;">
        <div class="pc" data-rot="135"><img src="images/aleksandra-b-wVtwlktxQE0-unsplash.jpg" alt=""></div>
      </div>

      <!-- 4 — right, −135° -->
      <div class="pw" style="left:337px;top:-632px;width:266px;height:266px;">
        <div class="pc" data-rot="-135"><img src="images/shaain-ibrahim-WhavwKQeFCw-unsplash.jpg" alt=""></div>
      </div>

      <!-- 5 — far left, −67° -->
      <div class="pw" style="left:-749px;top:-371px;width:257px;height:234px;">
        <div class="pc" data-rot="-67"><img src="images/miraxh-tereziu-1RKlecE_ehI-unsplash.jpg" alt=""></div>
      </div>

      <!-- 6 — far right, −113° -->
      <div class="pw" style="left:478px;top:-391px;width:259px;height:234px;">
        <div class="pc" data-rot="-113"><img src="images/ionut-dobre-0D1nf8pKON8-unsplash.jpg" alt=""></div>
      </div>

      <!-- 7 — lower left, −113° -->
      <div class="pw" style="left:-742px;top:213px;width:259px;height:237px;">
        <div class="pc" data-rot="-113"><img src="images/anna-murzilon-Eu8v-aKZdFg-unsplash.jpg" alt=""></div>
      </div>

      <!-- 8 — lower right, −67° -->
      <div class="pw" style="left:487px;top:196px;width:257px;height:235px;">
        <div class="pc" data-rot="-67"><img src="images/pierre-blache-R5ne5S9R_cs-unsplash.jpg" alt=""></div>
      </div>

      <!-- 9 — lower far left, −135° -->
      <div class="pw" style="left:-608px;top:422px;width:266px;height:266px;">
        <div class="pc" data-rot="-135"><img src="images/oleg-oros-YIQAvqbSyjw-unsplash.jpg" alt=""></div>
      </div>

      <!-- 10 — lower far right, 135° -->
      <div class="pw" style="left:337px;top:422px;width:266px;height:266px;">
        <div class="pc" data-rot="135"><img src="images/ryan-spencer-XGKaRnWjv1c-unsplash.jpg" alt=""></div>
      </div>

      <!-- 11 — lower left of centre, +23° -->
      <div class="pw" style="left:-392px;top:580px;width:237px;height:260px;">
        <div class="pc" data-rot="23"><img src="images/niklas-ohlrogge-niamoh-de-BkmdKnuAZtw-unsplash.jpg" alt=""></div>
      </div>

      <!-- 12 — lower right of centre, −23° -->
      <div class="pw" style="left:146px;top:582px;width:237px;height:260px;">
        <div class="pc" data-rot="-23"><img src="images/joshua-rawson-harris-S4ZkQykkeRs-unsplash.jpg" alt=""></div>
      </div>

      <!-- 13 — bottom centre, 0° -->
      <div class="pw" style="left:-83px;top:671px;width:166px;height:210px;">
        <div class="pc" data-rot="0"><img src="images/hasmik-ghazaryan-olson-z5ivBl5Dd1s-unsplash.jpg" alt=""></div>
      </div>

    </div>
  </div>

  <!-- Gradient fade out -->
  <div class="fade"></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  // ── Scale page to fit any viewport ──
  function applyScale() {
    const scale = window.innerWidth / 1440;
    document.documentElement.style.setProperty('--scale', scale);
    document.body.style.height = (3200 * scale) + 'px';
    ScrollTrigger.refresh();
  }
  applyScale();
  window.addEventListener('resize', applyScale);

  // ── Set each card's initial tilt from data-rot ──
  document.querySelectorAll('.pc').forEach(card => {
    const rot = parseFloat(card.dataset.rot) || 0;
    gsap.set(card, { rotation: rot });
  });

  // ── Smooth scroll-driven wheel rotation (lerp via GSAP ticker) ──
  // Avoids ScrollTrigger fighting the CSS scale transform on .page.
  const wheel = document.getElementById('arcWheel');

  let targetRot  = 0;
  let currentRot = 0;

  function getProgress() {
    const scale  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale')) || 1;
    // arcSection: top=950px, height=2200px in unscaled page coords
    const startPx = 950  * scale;          // screen-px where animation begins
    const endPx   = 3150 * scale;          // screen-px where animation ends
    const sy      = window.scrollY + window.innerHeight * 0.65;
    return Math.max(0, Math.min(1, (sy - startPx) / (endPx - startPx)));
  }

  window.addEventListener('scroll', () => {
    targetRot = getProgress() * -180;
  }, { passive: true });

  // RAF loop via GSAP ticker — lerp factor 0.07 = very smooth
  gsap.ticker.add(() => {
    const diff = targetRot - currentRot;
    if (Math.abs(diff) > 0.005) {
      currentRot += diff * 0.07;
      gsap.set(wheel, { rotation: currentRot });
    }
  });

  // Fade the arc section in as it enters the viewport
  window.addEventListener('scroll', () => {
    const scale   = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale')) || 1;
    const fadeStart = 900 * scale;
    const fadeEnd   = 1200 * scale;
    const t = Math.max(0, Math.min(1, (window.scrollY - fadeStart) / (fadeEnd - fadeStart)));
    document.getElementById('arcSection').style.opacity = t;
  }, { passive: true });

</script>
</body>
</html>
