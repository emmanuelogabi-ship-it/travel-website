<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Away</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fffaf5;
      font-family: 'Instrument Sans', sans-serif;
      overflow-x: hidden;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 1440px;
      min-height: 3200px;
      transform-origin: top left;
      transform: scale(var(--scale));
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 44px;
      left: 74px;
      right: 74px;
      display: flex;
      align-items: center;
      z-index: 20;
    }

    .logo {
      font-weight: 700;
      font-size: 32px;
      color: #000;
    }

    .nav-links {
      display: flex;
      gap: 64px;
      list-style: none;
      font-size: 14px;
      color: #000;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a { text-decoration: none; color: inherit; }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: none;
      border-radius: 4px;
      padding: 14px 28px;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      color: #000;
      margin-left: auto;
    }

    .contact-btn .arrow {
      width: 24px;
      height: 24px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .nav-divider {
      position: absolute;
      top: 99px;
      left: 74px;
      right: 74px;
      height: 1px;
      background: rgba(0, 0, 0, 0.12);
    }

    /* ── HERO ── */
    .hero {
      position: absolute;
      top: 117px;
      left: 74px;
      right: 74px;
      height: 461px;
      border-radius: 24px;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 104%;
      height: 220%;
      left: -2%;
      top: -47%;
      object-fit: cover;
    }

    .hero-title {
      position: absolute;
      top: 204px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 700;
      font-size: 32px;
      color: #000;
      white-space: nowrap;
      z-index: 2;
    }

    /* ── SEARCH CARD ── */
    .search-card {
      position: absolute;
      top: 491px;
      left: 50%;
      transform: translateX(-50%);
      width: 860px;
      height: 191px;
      background: white;
      border-radius: 24px;
      z-index: 5;
    }

    /* ── ARC PHOTOS ── */
    .photo-wrap {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .photo-card {
      border-radius: 11px;
      overflow: hidden;
      width: 166px;
      height: 210px;
      position: relative;
      flex-shrink: 0;
    }

    .photo-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── GRADIENT FADE ── */
    .fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1600px;
      background: linear-gradient(to top, #fffaf5 45%, rgba(255,250,245,0) 80%);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav>
    <span class="logo">Away</span>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Tour</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <button class="contact-btn">
      Contact us
      <span class="arrow">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 6.5H10.5M7 3L10.5 6.5L7 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>
  </nav>

  <div class="nav-divider"></div>

  <!-- HERO -->
  <div class="hero">
    <img src="images/neom-aWHKsYkbCi8-unsplash.jpg" alt="Hero landscape" />
  </div>
  <p class="hero-title">Reverb.</p>

  <!-- SEARCH CARD -->
  <div class="search-card"></div>

  <!-- ── ARC PHOTOS ──
       Positions translated from Figma 1606px canvas → 1440px (scale x ×0.897)
       Each .photo-wrap is positioned at the bounding box; .photo-card is rotated inside.
  -->

  <!-- Center top — upright -->
  <div class="photo-wrap" style="left:634px; top:1286px; width:166px; height:210px;">
    <div class="photo-card">
      <img src="images/taras-terletskyy-OrhPYiKmXsE-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Slight left — −23° -->
  <div class="photo-wrap" style="left:332px; top:1315px; width:237px; height:260px;">
    <div class="photo-card" style="transform:rotate(-23deg);">
      <img src="images/tania-mousinho-vF0l0bqLRKY-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Slight right — +23° -->
  <div class="photo-wrap" style="left:869px; top:1317px; width:237px; height:260px;">
    <div class="photo-card" style="transform:rotate(23deg);">
      <img src="images/daniela-cuevas-t7YycgAoVSw-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Left — 135° (portrait on side) -->
  <div class="photo-wrap" style="left:112px; top:1468px; width:266px; height:266px;">
    <div class="photo-card" style="transform:rotate(135deg);">
      <img src="images/aleksandra-b-wVtwlktxQE0-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Right — −135° -->
  <div class="photo-wrap" style="left:1057px; top:1468px; width:266px; height:266px;">
    <div class="photo-card" style="transform:rotate(-135deg);">
      <img src="images/shaain-ibrahim-WhavwKQeFCw-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Far left — −67° -->
  <div class="photo-wrap" style="left:-29px; top:1729px; width:257px; height:234px;">
    <div class="photo-card" style="transform:rotate(-67deg);">
      <img src="images/miraxh-tereziu-1RKlecE_ehI-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Far right — −113° -->
  <div class="photo-wrap" style="left:1198px; top:1709px; width:259px; height:234px;">
    <div class="photo-card" style="transform:rotate(-113deg);">
      <img src="images/ionut-dobre-0D1nf8pKON8-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Lower left — −113° -->
  <div class="photo-wrap" style="left:-22px; top:2313px; width:259px; height:237px;">
    <div class="photo-card" style="transform:rotate(-113deg);">
      <img src="images/anna-murzilon-Eu8v-aKZdFg-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Lower right — −67° -->
  <div class="photo-wrap" style="left:1207px; top:2296px; width:257px; height:235px;">
    <div class="photo-card" style="transform:rotate(-67deg);">
      <img src="images/pierre-blache-R5ne5S9R_cs-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Lower far left — −135° -->
  <div class="photo-wrap" style="left:112px; top:2522px; width:266px; height:266px;">
    <div class="photo-card" style="transform:rotate(-135deg);">
      <img src="images/oleg-oros-YIQAvqbSyjw-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Lower far right — 135° -->
  <div class="photo-wrap" style="left:1057px; top:2522px; width:266px; height:266px;">
    <div class="photo-card" style="transform:rotate(135deg);">
      <img src="images/ryan-spencer-XGKaRnWjv1c-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Lower left of center — +23° -->
  <div class="photo-wrap" style="left:328px; top:2680px; width:237px; height:260px;">
    <div class="photo-card" style="transform:rotate(23deg);">
      <img src="images/niklas-ohlrogge-niamoh-de-BkmdKnuAZtw-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Lower right of center — −23° -->
  <div class="photo-wrap" style="left:866px; top:2682px; width:237px; height:260px;">
    <div class="photo-card" style="transform:rotate(-23deg);">
      <img src="images/joshua-rawson-harris-S4ZkQykkeRs-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Bottom center — upright -->
  <div class="photo-wrap" style="left:634px; top:2771px; width:166px; height:210px;">
    <div class="photo-card">
      <img src="images/hasmik-ghazaryan-olson-z5ivBl5Dd1s-unsplash.jpg" alt="" />
    </div>
  </div>

  <!-- Gradient fade out -->
  <div class="fade"></div>

</div>
<script>
  function applyScale() {
    const scale = window.innerWidth / 1440;
    document.documentElement.style.setProperty('--scale', scale);
    document.body.style.height = (3200 * scale) + 'px';
  }
  applyScale();
  window.addEventListener('resize', applyScale);
</script>
</body>
</html>
