<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Away</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fffaf5;
      font-family: 'Instrument Sans', sans-serif;
      overflow-x: hidden;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 1440px;
      min-height: 3200px;
      transform-origin: top left;
      transform: scale(var(--scale));
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 44px;
      left: 74px;
      right: 74px;
      display: flex;
      align-items: center;
      z-index: 20;
    }

    .logo {
      font-weight: 700;
      font-size: 32px;
      color: #000;
    }

    .nav-links {
      display: flex;
      gap: 64px;
      list-style: none;
      font-size: 14px;
      color: #000;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a { text-decoration: none; color: inherit; }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: none;
      border-radius: 4px;
      padding: 14px 28px;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      color: #000;
      margin-left: auto;
    }

    .contact-btn .arrow {
      width: 24px;
      height: 24px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .nav-divider {
      position: absolute;
      top: 99px;
      left: 74px;
      right: 74px;
      height: 1px;
      background: rgba(0, 0, 0, 0.12);
    }

    /* ── HERO ── */
    .hero {
      position: absolute;
      top: 117px;
      left: 74px;
      right: 74px;
      height: 461px;
      border-radius: 24px;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 104%;
      height: 220%;
      left: -2%;
      top: -47%;
      object-fit: cover;
    }

    .hero-title {
      position: absolute;
      top: 204px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 700;
      font-size: 32px;
      color: #000;
      white-space: nowrap;
      z-index: 2;
    }

    /* ── SEARCH CARD ── */
    .search-card {
      position: absolute;
      top: 491px;
      left: 50%;
      transform: translateX(-50%);
      width: 860px;
      height: 191px;
      background: white;
      border-radius: 24px;
      z-index: 5;
    }

    /* ── ARC WHEEL ── */
    .pw {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pc {
      border-radius: 11px;
      overflow: hidden;
      width: 166px;
      height: 210px;
      position: relative;
      flex-shrink: 0;
      will-change: transform;
    }

    .pc img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

  </style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav>
    <span class="logo">Away</span>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Tour</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <button class="contact-btn">
      Contact us
      <span class="arrow">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 6.5H10.5M7 3L10.5 6.5L7 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>
  </nav>

  <div class="nav-divider"></div>

  <!-- HERO -->
  <div class="hero">
    <img src="images/daniela-cuevas-t7YycgAoVSw-unsplash.jpg" alt="Hero landscape" />
  </div>
  <p class="hero-title">Reverb.</p>

  <!-- SEARCH CARD -->
  <div class="search-card"></div>

  <!-- ── FULL CIRCLE WHEEL ──
       16 cards at R=650 around centre (720, 2000) in page coords.
       Wheel origin is at that centre; card offsets = polar → cartesian.
       Angles: 0° = top, 22.5° steps clockwise.
       Each card rotates = its angle so it faces outward naturally.
  -->
  <div id="arcSection" style="position:absolute;top:1000px;left:0;width:1440px;height:2100px;pointer-events:none;overflow:visible;">
    <div id="arcWheel" style="position:absolute;left:720px;top:1000px;width:0;height:0;transform-origin:0 0;will-change:transform;">

      <!-- R=650  card=166×210  half=83×105 -->
      <!-- left = 650·sin(θ)−83   top = −650·cos(θ)−105 -->

      <!-- θ=0°   → left=−83   top=−755 -->
      <div class="pw" style="left:-83px;top:-755px;width:166px;height:210px;">
        <div class="pc" data-rot="0"><img src="images/taras-terletskyy-OrhPYiKmXsE-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=22.5° → left=166   top=−706 -->
      <div class="pw" style="left:166px;top:-706px;width:166px;height:210px;">
        <div class="pc" data-rot="22.5"><img src="images/tania-mousinho-vF0l0bqLRKY-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=45°   → left=377   top=−565 -->
      <div class="pw" style="left:377px;top:-565px;width:166px;height:210px;">
        <div class="pc" data-rot="45"><img src="images/shaain-ibrahim-WhavwKQeFCw-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=67.5° → left=518   top=−354 -->
      <div class="pw" style="left:518px;top:-354px;width:166px;height:210px;">
        <div class="pc" data-rot="67.5"><img src="images/ionut-dobre-0D1nf8pKON8-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=90°   → left=567   top=−105 -->
      <div class="pw" style="left:567px;top:-105px;width:166px;height:210px;">
        <div class="pc" data-rot="90"><img src="images/joshua-rawson-harris-S4ZkQykkeRs-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=112.5° → left=518  top=144 -->
      <div class="pw" style="left:518px;top:144px;width:166px;height:210px;">
        <div class="pc" data-rot="112.5"><img src="images/ryan-spencer-XGKaRnWjv1c-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=135°  → left=377   top=355 -->
      <div class="pw" style="left:377px;top:355px;width:166px;height:210px;">
        <div class="pc" data-rot="135"><img src="images/pierre-blache-R5ne5S9R_cs-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=157.5° → left=166  top=496 -->
      <div class="pw" style="left:166px;top:496px;width:166px;height:210px;">
        <div class="pc" data-rot="157.5"><img src="images/oleg-oros-YIQAvqbSyjw-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=180°  → left=−83   top=545 -->
      <div class="pw" style="left:-83px;top:545px;width:166px;height:210px;">
        <div class="pc" data-rot="180"><img src="images/hasmik-ghazaryan-olson-z5ivBl5Dd1s-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=202.5° → left=−332 top=496 -->
      <div class="pw" style="left:-332px;top:496px;width:166px;height:210px;">
        <div class="pc" data-rot="202.5"><img src="images/lucas-t-photography-E769yCcpYKo-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=225°  → left=−543  top=355 -->
      <div class="pw" style="left:-543px;top:355px;width:166px;height:210px;">
        <div class="pc" data-rot="225"><img src="images/niklas-ohlrogge-niamoh-de-BkmdKnuAZtw-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=247.5° → left=−684 top=144 -->
      <div class="pw" style="left:-684px;top:144px;width:166px;height:210px;">
        <div class="pc" data-rot="247.5"><img src="images/miraxh-tereziu-1RKlecE_ehI-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=270°  → left=−733  top=−105 -->
      <div class="pw" style="left:-733px;top:-105px;width:166px;height:210px;">
        <div class="pc" data-rot="270"><img src="images/neom-aWHKsYkbCi8-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=292.5° → left=−684 top=−354 -->
      <div class="pw" style="left:-684px;top:-354px;width:166px;height:210px;">
        <div class="pc" data-rot="292.5"><img src="images/anna-murzilon-Eu8v-aKZdFg-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=315°  → left=−543  top=−565 -->
      <div class="pw" style="left:-543px;top:-565px;width:166px;height:210px;">
        <div class="pc" data-rot="315"><img src="images/aleksandra-b-wVtwlktxQE0-unsplash.jpg" alt=""></div>
      </div>

      <!-- θ=337.5° → left=−332 top=−706 -->
      <div class="pw" style="left:-332px;top:-706px;width:166px;height:210px;">
        <div class="pc" data-rot="337.5"><img src="images/joshua-rondeau-EIeVusiphj4-unsplash.jpg" alt=""></div>
      </div>

    </div>
    <!-- Fade bottom half of circle -->
    <div style="position:absolute;inset:0;background:linear-gradient(to top,#fffaf5 20%,rgba(255,250,245,0) 55%);pointer-events:none;z-index:5;"></div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  // ── Scale page to fit any viewport ──
  function applyScale() {
    const scale = window.innerWidth / 1440;
    document.documentElement.style.setProperty('--scale', scale);
    document.body.style.height = (3200 * scale) + 'px';
    ScrollTrigger.refresh();
  }
  applyScale();
  window.addEventListener('resize', applyScale);

  const wheel  = document.getElementById('arcWheel');
  const cards  = Array.from(document.querySelectorAll('.pc'));
  const origRots = cards.map(c => parseFloat(c.dataset.rot) || 0);

  // Set each card to face outward radially
  cards.forEach((c, i) => gsap.set(c, { rotation: origRots[i] }));

  let targetRot  = 0;
  let currentRot = 0;

  function getProgress() {
    const scale   = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale')) || 1;
    const startPx = 1000 * scale;
    const endPx   = 3100 * scale;
    const sy      = window.scrollY + window.innerHeight * 0.6;
    return Math.max(0, Math.min(1, (sy - startPx) / (endPx - startPx)));
  }

  window.addEventListener('scroll', () => {
    targetRot = getProgress() * 270;
  }, { passive: true });

  gsap.ticker.add(() => {
    const diff = targetRot - currentRot;
    if (Math.abs(diff) > 0.005) {
      currentRot += diff * 0.07;
      gsap.set(wheel, { rotation: currentRot });
      // Keep each card facing outward (no counter-rotation needed)
      cards.forEach((c, i) => gsap.set(c, { rotation: origRots[i] }));
    }
  });


</script>
</body>
</html>
